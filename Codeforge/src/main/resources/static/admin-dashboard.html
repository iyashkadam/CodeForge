<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CodeForge Admin Dashboard - Manage courses and view enrollments.">
    <title>Admin Dashboard - CodeForge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<div class="dashboard">
    <nav class="navbar">
        <a href="admin-dashboard.html" class="navbar-brand">Code<span>Forge</span></a>
        <div class="navbar-nav">
            <a href="admin-dashboard.html" class="active">Dashboard</a>
            <span class="badge badge-admin">ADMIN</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1>Admin Dashboard</h1>
            <p>Manage courses and view student enrollments</p>
        </div>

        <div id="messageContainer"></div>

        <!-- Create Course Form -->
        <section class="section">
            <h2 class="section-title">Create New Course</h2>
            <div class="create-form">
                <form id="createCourseForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="courseName">Course Name</label>
                            <input type="text" id="courseName" name="name" placeholder="e.g., Introduction to Programming" required
                                   maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" name="code" placeholder="e.g., CS101" required maxlength="20">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="courseDescription">Description</label>
                        <input type="text" id="courseDescription" name="description" placeholder="Brief description of the course"
                               maxlength="500">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="courseDuration">Duration (Hours)</label>
                            <input type="number" id="courseDuration" name="duration" placeholder="e.g., 40" min="1" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="createBtn" style="max-width: 200px;">
                        Create Course
                    </button>
                </form>
            </div>
        </section>

        <!-- Course List -->
        <section class="section">
            <h2 class="section-title">All Courses</h2>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Search courses..."
                       oninput="handleSearch()">
                <button class="btn btn-outline btn-sm" onclick="clearSearch()">Clear</button>
            </div>
            <div id="coursesContainer" class="cards-grid">
                <div class="loading">Loading courses...</div>
            </div>
        </section>
    </main>
</div>

<script src="js/app.js"></script>
<script>
    // Check authentication and role
    if (!requireRole('ADMIN')) {
      // Will redirect automatically
    }

    const createCourseForm = document.getElementById('createCourseForm');
    const createBtn = document.getElementById('createBtn');

    // Create course handler
    createCourseForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('courseName').value.trim();
      const code = document.getElementById('courseCode').value.trim();
      const description = document.getElementById('courseDescription').value.trim();
      const duration = document.getElementById('courseDuration').value;

      if (!validateRequired(name)) {
        showMessage('messageContainer', 'Please enter a course name', 'error');
        return;
      }

      if (!validateRequired(code)) {
        showMessage('messageContainer', 'Please enter a course code', 'error');
        return;
      }

      if (!duration || duration <= 0) {
        showMessage('messageContainer', 'Please enter a valid duration', 'error');
        return;
      }

      createBtn.disabled = true;
      createBtn.textContent = 'Creating...';

      try {
        await createCourse({ title: name, code, description, duration: parseInt(duration) });
        showMessage('messageContainer', 'Course created successfully!', 'success');
        createCourseForm.reset();
        loadCourses(); // Reload courses list
      } catch (error) {
        showMessage('messageContainer', error.message || 'Failed to create course', 'error');
      } finally {
        createBtn.disabled = false;
        createBtn.textContent = 'Create Course';
      }
    });

    let allCourses = [];

    async function loadCourses() {
      const container = document.getElementById('coursesContainer');
      try {
        allCourses = await getCourses();
        renderCourses(allCourses);
      } catch (error) {
        container.innerHTML = `<div class="message message-error">Failed to load courses: ${escapeHtml(error.message)}</div>`;
      }
    }

    function handleSearch() {
      const term = document.getElementById('searchInput').value;
      renderCourses(filterCourses(allCourses, term));
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderCourses(allCourses);
    }

    function renderCourses(courses) {
      const container = document.getElementById('coursesContainer');
      if (!courses || courses.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No Courses</h3></div>';
        return;
      }
      container.innerHTML = courses.map(course => `
        <div class="card">
          <div class="card-header">
            <h3>${escapeHtml(course.name || course.title || 'Untitled Course')}</h3>
            <p>${escapeHtml(course.code || '')}</p>
          </div>
          <div class="card-body">
            <p>${escapeHtml(course.description || 'No description')}</p>
            <div class="card-actions">
              <a href="students.html?courseId=${course.id}" class="btn btn-secondary btn-sm">View Students</a>
              <a href="community.html?courseId=${course.id}&title=${encodeURIComponent(course.name || course.title)}" class="btn btn-outline btn-sm">View Community</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    loadCourses();
</script>
</body>

</html>
